name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations against a fresh database
        run: alembic upgrade head
        env:
          DATABASE_URL: "sqlite:///./ci_test.db"

      - name: Run tests
        run: pytest tests/ -v
